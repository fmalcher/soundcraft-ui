<label>Fader Level</label>
<input type="range" min="0" max="1" step="0.00000000001" (input)="setFaderLevel(faderLevelInput.value)"
  [value]="channel().faderLevel$ | async" #faderLevelInput />
<button class="btn btn-success btn-sm ms-3" (click)="channel().changeFaderLevelDB(3)">
  + 3 dB
</button>
<button class="btn btn-success btn-sm ms-2" (click)="channel().changeFaderLevelDB(-3)">
  – 3 dB
</button>
<button class="btn btn-outline-success btn-sm ms-2" (click)="channel().changeFaderLevel(0.05)">
  + 5 %
</button>
<button class="btn btn-outline-success btn-sm ms-2" (click)="channel().changeFaderLevel(-0.05)">
  – 5 %
</button>
<span class="badge badge-rounded text-bg-secondary ms-3">{{ channel().faderLevelDB$ | async }}&nbsp;dB</span>
<span class="badge badge-rounded text-bg-secondary ms-2">{{ channel().faderLevel$ | async }}</span>
